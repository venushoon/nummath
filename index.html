<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>초등 4학년 큰 수 마스터 v2</title>
    <style>
        :root {
            --primary: #4a90e2; --secondary: #f39c12;
            --success: #2ecc71; --danger: #e74c3c; --bg: #f8f9fa;
        }
        body {
            font-family: 'Pretendard', -apple-system, sans-serif;
            background-color: var(--bg); margin: 0; overflow: hidden;
            touch-action: manipulation; /* 터치 지연 방지 */
        }
        .screen { display: none; width: 100vw; height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }

        /* 설정 화면 스타일 */
        .settings-box { background: white; padding: 30px; border-radius: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); text-align: center; }
        .option-group { margin: 20px 0; }
        .opt-btn { padding: 10px 20px; margin: 5px; border: 2px solid #ddd; border-radius: 10px; cursor: pointer; background: white; font-weight: bold; }
        .opt-btn.selected { background: var(--primary); color: white; border-color: var(--primary); }

        /* 게임 UI */
        .timer-bar { width: 80%; height: 10px; background: #ddd; border-radius: 5px; margin: 10px 0; overflow: hidden; }
        .timer-fill { height: 100%; background: var(--danger); width: 100%; transition: width 1s linear; }
        
        .question-box { background: white; padding: 25px; border-radius: 20px; margin-bottom: 20px; font-size: 32px; font-weight: 800; box-shadow: 0 5px 15px rgba(0,0,0,0.08); text-align: center; width: 80%; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 90%; }
        .option-btn { padding: 20px 10px; font-size: 1.2rem; background: white; border: 2px solid #eee; border-radius: 15px; cursor: pointer; font-weight: 600; transition: all 0.2s; }
        
        /* 정/오답 효과 */
        .ans-correct { background-color: var(--success) !important; color: white; border-color: var(--success); transform: scale(1.05); }
        .ans-wrong { background-color: var(--danger) !important; color: white; border-color: var(--danger); }

        /* 경쟁 모드 전용 */
        .battle-layout { display: flex; width: 100%; height: 100%; }
        .player-zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 2px dashed #ccc; padding: 10px; position: relative; }
        .score { font-size: 24px; font-weight: bold; color: var(--primary); margin-bottom: 5px; }

        .start-btn { padding: 20px 60px; font-size: 24px; background: var(--success); color: white; border: none; border-radius: 50px; cursor: pointer; margin-top: 20px; }
    </style>
</head>
<body>

    <div id="menu" class="screen active">
        <div class="settings-box">
            <h1>🔢 큰 수 마스터 설정</h1>
            <div class="option-group">
                <p><strong>수 범위 선택</strong></p>
                <button class="opt-btn selected" onclick="setLimit('man', this)">~만</button>
                <button class="opt-btn" onclick="setLimit('eok', this)">~억</button>
                <button class="opt-btn" onclick="setLimit('jo', this)">~조</button>
            </div>
            <div class="option-group">
                <p><strong>제한 시간</strong></p>
                <button class="opt-btn" onclick="setTime(30, this)">30초</button>
                <button class="opt-btn selected" onclick="setTime(60, this)">60초</button>
                <button class="opt-btn" onclick="setTime(0, this)">무제한</button>
            </div>
            <hr>
            <button class="start-btn" onclick="initGame('single')">👤 1인 연습</button>
            <button class="start-btn" style="background:var(--secondary)" onclick="initGame('battle')">👥 2인 경쟁</button>
        </div>
    </div>

    <div id="single-game" class="screen">
        <div class="score">점수: <span id="s-score">0</span> | 시간: <span id="s-timer-text">-</span></div>
        <div class="timer-bar"><div id="s-timer-fill" class="timer-fill"></div></div>
        <div class="question-box" id="s-question"></div>
        <div class="options-grid" id="s-options"></div>
    </div>

    <div id="battle-game" class="screen">
        <div class="battle-layout">
            <div class="player-zone" id="p1-zone">
                <div class="score">A팀: <span id="p1-score">0</span></div>
                <div class="question-box" id="p1-question"></div>
                <div id="p1-options" class="options-grid"></div>
            </div>
            <div class="player-zone" id="p2-zone">
                <div class="score">B팀: <span id="p2-score">0</span></div>
                <div class="question-box" id="p2-question"></div>
                <div id="p2-options" class="options-grid"></div>
            </div>
        </div>
        <div style="position:absolute; top:10px; font-weight:bold; background:white; padding:5px 15px; border-radius:20px;">
            남은 시간: <span id="b-timer-text">-</span>
        </div>
    </div>

    <script>
        let config = { limit: 100000000, time: 60, mode: 'single' };
        let gameState = { sScore: 0, p1Score: 0, p2Score: 0, timeLeft: 60, timerId: null };

        function setLimit(type, btn) {
            const limits = { 'man': 100000000, 'eok': 1000000000000, 'jo': 10000000000000000 };
            config.limit = limits[type];
            selectBtn(btn);
        }

        function setTime(sec, btn) {
            config.time = sec;
            selectBtn(btn);
        }

        function selectBtn(btn) {
            Array.from(btn.parentElement.querySelectorAll('.opt-btn')).forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        function numberToKorean(num) {
            const units = ['', '만', '억', '조'];
            const digits = ['', '일', '이', '삼', '사', '오', '육', '칠', '팔', '구'];
            const tens = ['', '십', '백', '천'];
            let result = ''; let unitIdx = 0;
            let tempNum = num;
            while (tempNum > 0) {
                let chunk = tempNum % 10000;
                let chunkStr = '';
                let chunkArr = String(chunk).split('').reverse();
                for (let i = 0; i < chunkArr.length; i++) {
                    let d = parseInt(chunkArr[i]);
                    if (d !== 0) {
                        let t = digits[d] + tens[i];
                        if (t === '일십') t = '십'; if (t === '일백') t = '백'; if (t === '일천') t = '천';
                        chunkStr = t + chunkStr;
                    }
                }
                if (chunkStr !== '') result = chunkStr + units[unitIdx] + result;
                tempNum = Math.floor(tempNum / 10000); unitIdx++;
            }
            return result || '영';
        }

        function generateQuiz() {
            const range = config.limit;
            const min = range / 10000;
            const num = Math.floor(Math.random() * (range - min)) + min;
            const isReadType = Math.random() > 0.5;
            const question = isReadType ? num.toLocaleString('ko-KR') : numberToKorean(num);
            const answer = isReadType ? numberToKorean(num) : num.toLocaleString('ko-KR');
            
            let options = [answer];
            while (options.length < 4) {
                let diff = (Math.floor(Math.random() * 20) - 10) * (range/100);
                let wNum = Math.abs(num + diff);
                let wOpt = isReadType ? numberToKorean(wNum) : wNum.toLocaleString('ko-KR');
                if (!options.includes(wOpt) && wOpt !== "") options.push(wOpt);
            }
            return { q: question, a: answer, opts: options.sort(() => Math.random() - 0.5) };
        }

        function initGame(mode) {
            config.mode = mode;
            gameState.timeLeft = config.time;
            gameState.sScore = 0; gameState.p1Score = 0; gameState.p2Score = 0;
            
            document.getElementById('menu').classList.remove('active');
            const screenId = mode === 'single' ? 'single-game' : 'battle-game';
            document.getElementById(screenId).classList.add('active');

            if (mode === 'single') renderQuiz('s');
            else { renderQuiz('p1'); renderQuiz('p2'); }

            if (config.time > 0) startTimer();
            else { 
                document.getElementById('s-timer-text').innerText = "무제한";
                document.getElementById('b-timer-text').innerText = "무제한";
            }
        }

        function renderQuiz(pid) {
            const data = generateQuiz();
            const qBox = document.getElementById(`${pid}-question`);
            const oGrid = document.getElementById(`${pid}-options`);
            qBox.innerText = data.q;
            oGrid.innerHTML = '';

            data.opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                // 전자칠판 동시 터치 대응을 위해 고유 이벤트 할당
                btn.onclick = (e) => handleAnswer(pid, opt, data.a, e.target, oGrid);
                oGrid.appendChild(btn);
            });
        }

        function handleAnswer(pid, clicked, correct, btn, grid) {
            if (grid.classList.contains('locked')) return; // 중복 클릭 방지
            grid.classList.add('locked');

            if (clicked === correct) {
                btn.classList.add('ans-correct');
                updateScore(pid, 10);
                setTimeout(() => { grid.classList.remove('locked'); renderQuiz(pid); }, 600);
            } else {
                btn.classList.add('ans-wrong');
                // 오답 시 정답 보여주기
                Array.from(grid.children).forEach(b => {
                    if (b.innerText === correct) b.classList.add('ans-correct');
                });
                setTimeout(() => { grid.classList.remove('locked'); renderQuiz(pid); }, 1500); // 정답 볼 시간 1.5초 부여
            }
        }

        function updateScore(pid, points) {
            if (pid === 's') { gameState.sScore += points; document.getElementById('s-score').innerText = gameState.sScore; }
            else if (pid === 'p1') { gameState.p1Score += points; document.getElementById('p1-score').innerText = gameState.p1Score; }
            else { gameState.p2Score += points; document.getElementById('p2-score').innerText = gameState.p2Score; }
        }

        function startTimer() {
            const fill = document.getElementById('s-timer-fill');
            gameState.timerId = setInterval(() => {
                gameState.timeLeft--;
                const txt = gameState.timeLeft + "초";
                document.getElementById('s-timer-text').innerText = txt;
                document.getElementById('b-timer-text').innerText = txt;
                
                if (fill) fill.style.width = (gameState.timeLeft / config.time * 100) + "%";

                if (gameState.timeLeft <= 0) {
                    clearInterval(gameState.timerId);
                    alert(`게임 종료!\n최종 점수: ${config.mode === 'single' ? gameState.sScore : 'A팀 '+gameState.p1Score+' : B팀 '+gameState.p2Score}`);
                    location.reload();
                }
            }, 1000);
        }
    </script>
</body>
</html>
