<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>4학년 수학: 큰 수 마스터</title>
    <style>
        :root {
            --primary: #4a90e2;
            --secondary: #f39c12;
            --success: #2ecc71;
            --danger: #e74c3c;
            --bg: #f0f3f5;
        }

        body {
            font-family: 'Pretendard', sans-serif;
            background-color: var(--bg);
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            overflow: hidden;
        }

        /* 메인 메뉴 */
        #menu { text-align: center; }
        .btn {
            padding: 20px 40px;
            font-size: 24px;
            margin: 10px;
            cursor: pointer;
            border: none;
            border-radius: 15px;
            transition: transform 0.2s;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        .btn:active { transform: scale(0.95); }
        .btn-blue { background-color: var(--primary); color: white; }
        .btn-orange { background-color: var(--secondary); color: white; }

        /* 게임 화면 공통 */
        .screen { display: none; width: 100%; height: 100vh; position: relative; }
        .active { display: flex; flex-direction: column; align-items: center; justify-content: center; }

        /* 문제 표시 영역 */
        .question-box {
            background: white;
            padding: 30px;
            border-radius: 20px;
            margin-bottom: 30px;
            font-size: 40px;
            font-weight: bold;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            text-align: center;
            min-width: 300px;
        }

        /* 보가 버튼 그리드 */
        .options-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 15px;
            width: 90%;
            max-width: 800px;
        }
        .option-btn {
            padding: 25px;
            font-size: 24px;
            background: white;
            border: 3px solid var(--primary);
            border-radius: 15px;
            cursor: pointer;
        }
        .option-btn:hover { background: #eef6ff; }

        /* 2인 경쟁 모드 레이아웃 */
        .battle-container {
            display: flex;
            width: 100%;
            height: 100%;
        }
        .player-side {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border-right: 2px dashed #ccc;
            padding: 20px;
        }
        .player-side:last-child { border-right: none; }
        .score-badge {
            font-size: 30px;
            margin-bottom: 10px;
            color: var(--primary);
        }

        /* 피드백 애니메이션 */
        .correct { background-color: var(--success) !important; color: white; }
        .wrong { background-color: var(--danger) !important; color: white; }
    </style>
</head>
<body>

    <div id="menu" class="screen active">
        <h1 style="font-size: 3rem;">🔢 큰 수 마스터!</h1>
        <p style="font-size: 1.2rem; color: #666;">만 단위부터 억 단위까지 익혀봐요.</p>
        <button class="btn btn-blue" onclick="startGame('single')">1인용 연습모드</button>
        <button class="btn btn-orange" onclick="startGame('battle')">2인 경쟁모드</button>
    </div>

    <div id="single-game" class="screen">
        <div class="score-badge">점수: <span id="s-score">0</span></div>
        <div class="question-box" id="s-question">문제 생성중...</div>
        <div class="options-grid" id="s-options"></div>
        <button class="btn" style="margin-top:40px;" onclick="location.reload()">처음으로</button>
    </div>

    <div id="battle-game" class="screen">
        <div class="battle-container">
            <div class="player-side" id="p1-side">
                <div class="score-badge">A팀: <span id="p1-score">0</span></div>
                <div class="question-box" id="p1-question">?</div>
                <div class="options-grid" id="p1-options"></div>
            </div>
            <div class="player-side" id="p2-side">
                <div class="score-badge">B팀: <span id="p2-score">0</span></div>
                <div class="question-box" id="p2-question">?</div>
                <div class="options-grid" id="p2-options"></div>
            </div>
        </div>
        <button class="btn" style="position: absolute; bottom: 20px;" onclick="location.reload()">종료</button>
    </div>

    <script>
        let score1 = 0;
        let score2 = 0;
        let singleScore = 0;

        // 수 읽기 변환 함수
        function numberToKorean(num) {
            const units = ['', '만', '억', '조'];
            const digits = ['', '일', '이', '삼', '사', '오', '육', '칠', '팔', '구'];
            const tens = ['', '십', '백', '천'];
            
            let result = '';
            let unitIdx = 0;
            
            while (num > 0) {
                let chunk = num % 10000;
                let chunkStr = '';
                let chunkArr = String(chunk).split('').reverse();
                
                for (let i = 0; i < chunkArr.length; i++) {
                    let d = parseInt(chunkArr[i]);
                    if (d !== 0) {
                        let temp = digits[d] + tens[i];
                        // '일십' -> '십' 처리 (단, 만/억 단위 시작 제외)
                        if (temp === '일십') temp = '십';
                        if (temp === '일백') temp = '백';
                        if (temp === '일천') temp = '천';
                        chunkStr = temp + chunkStr;
                    }
                }
                
                if (chunkStr !== '') {
                    result = chunkStr + units[unitIdx] + result;
                }
                num = Math.floor(num / 10000);
                unitIdx++;
            }
            return result || '영';
        }

        // 문제 생성기 (숫자 -> 읽기 혹은 읽기 -> 숫자)
        function generateQuestion() {
            // 4학년 수준: 10,000 ~ 99,999,999 (만 ~ 천만 단위)
            const baseNum = Math.floor(Math.random() * 9000000) + 10000; 
            const isReadType = Math.random() > 0.5;
            
            const question = isReadType ? baseNum.toLocaleString() : numberToKorean(baseNum);
            const answer = isReadType ? numberToKorean(baseNum) : baseNum.toLocaleString();
            
            // 오답 생성
            let options = [answer];
            while (options.length < 4) {
                let offset = (Math.floor(Math.random() * 20) - 10) * 100;
                let wrongNum = Math.abs(baseNum + offset);
                let wrongOpt = isReadType ? numberToKorean(wrongNum) : wrongNum.toLocaleString();
                if (!options.includes(wrongOpt) && wrongOpt !== "") options.push(wrongOpt);
            }
            
            return {
                q: question,
                a: answer,
                options: options.sort(() => Math.random() - 0.5)
            };
        }

        // 게임 시작 핸들러
        function startGame(mode) {
            document.getElementById('menu').classList.remove('active');
            if (mode === 'single') {
                document.getElementById('single-game').classList.add('active');
                nextQuestionSingle();
            } else {
                document.getElementById('battle-game').classList.add('active');
                nextQuestionBattle(1);
                nextQuestionBattle(2);
            }
        }

        // 1인용 로직
        function nextQuestionSingle() {
            const data = generateQuestion();
            const qEl = document.getElementById('s-question');
            const optEl = document.getElementById('s-options');
            
            qEl.innerText = data.q;
            optEl.innerHTML = '';
            
            data.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    if (opt === data.a) {
                        btn.classList.add('correct');
                        singleScore += 10;
                        document.getElementById('s-score').innerText = singleScore;
                        setTimeout(nextQuestionSingle, 500);
                    } else {
                        btn.classList.add('wrong');
                        setTimeout(() => btn.classList.remove('wrong'), 500);
                    }
                };
                optEl.appendChild(btn);
            });
        }

        // 2인용 로직
        function nextQuestionBattle(playerNum) {
            const data = generateQuestion();
            const qEl = document.getElementById(`p${playerNum}-question`);
            const optEl = document.getElementById(`p${playerNum}-options`);
            
            qEl.innerText = data.q;
            optEl.innerHTML = '';
            
            data.options.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                btn.onclick = () => {
                    if (opt === data.a) {
                        btn.classList.add('correct');
                        if(playerNum === 1) score1 += 10; else score2 += 10;
                        document.getElementById(`p${playerNum}-score`).innerText = (playerNum === 1 ? score1 : score2);
                        setTimeout(() => nextQuestionBattle(playerNum), 500);
                    } else {
                        btn.classList.add('wrong');
                        setTimeout(() => btn.classList.remove('wrong'), 500);
                    }
                };
                optEl.appendChild(btn);
            });
        }
    </script>
</body>
</html>
