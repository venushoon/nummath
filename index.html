<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>초등 4학년 큰 수 마스터 v3</title>
    <link href="https://fonts.googleapis.com/css2?family=Jua&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #4DA8DA; --secondary: #FF9A76;
            --success: #67E667; --danger: #FF6B6B; 
            --bg: #F5F7FA; --text: #333;
        }
        body {
            font-family: 'Jua', sans-serif; /* 폰트 적용 */
            background-color: var(--bg); margin: 0; overflow: hidden;
            touch-action: manipulation;
            color: var(--text);
            background-image: radial-gradient(#ddd 1px, transparent 1px);
            background-size: 20px 20px;
        }
        .screen { display: none; width: 100vw; height: 100vh; flex-direction: column; align-items: center; justify-content: center; }
        .active { display: flex; }

        /* 설정 화면 스타일 */
        .settings-box { background: white; padding: 40px; border-radius: 30px; border: 4px solid #FFE2E2; box-shadow: 0 15px 0 #FFE2E2; text-align: center; max-width: 600px; }
        h1 { color: var(--primary); font-size: 3rem; margin-top: 0; text-shadow: 2px 2px 0px #fff, 4px 4px 0px rgba(0,0,0,0.1); }
        .option-group { margin: 25px 0; background: #FFF5F5; padding: 15px; border-radius: 20px; }
        .option-group p { font-size: 1.5rem; margin: 0 0 10px 0; color: #FF7B54; }
        
        /* 3D 옵션 버튼 */
        .opt-btn { padding: 12px 20px; margin: 5px; border: none; border-radius: 15px; cursor: pointer; background: white; font-size: 1.2rem; font-family: 'Jua', sans-serif; color: #555; box-shadow: 0 5px 0 #ddd; transition: all 0.1s; }
        .opt-btn:active { transform: translateY(5px); box-shadow: 0 0 0 #ddd; }
        .opt-btn.selected { background: var(--secondary); color: white; box-shadow: 0 5px 0 #E27A58; }

        /* 시작 버튼 */
        .start-btn { padding: 20px 50px; font-size: 28px; font-family: 'Jua'; background: var(--success); color: white; border: none; border-radius: 25px; cursor: pointer; margin: 10px; box-shadow: 0 8px 0 #4CB94C; transition: all 0.1s; }
        .start-btn:active { transform: translateY(8px); box-shadow: 0 0 0 #4CB94C; }
        .start-btn-battle { background: var(--primary); box-shadow: 0 8px 0 #3A88B5; }
        .start-btn-battle:active { box-shadow: 0 0 0 #3A88B5; }

        /* 게임 UI */
        .timer-bar { width: 80%; height: 20px; background: #eee; border-radius: 10px; margin: 15px 0; border: 3px solid #ddd; }
        .timer-fill { height: 100%; background: var(--danger); width: 100%; transition: width 1s linear; border-radius: 7px; }
        
        .question-box { background: white; padding: 30px; border-radius: 25px; margin-bottom: 25px; font-size: 45px; color: var(--primary); border: 4px solid #E1F0FA; box-shadow: 0 10px 0 #E1F0FA; text-align: center; width: 85%; word-break: keep-all; }
        .options-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; width: 95%; max-width: 900px; }
        
        /* 보기 버튼 */
        .option-btn { padding: 25px 10px; font-size: 1.6rem; font-family: 'Jua'; background: white; border: 4px solid #FFE2E2; border-radius: 20px; cursor: pointer; color: #444; box-shadow: 0 8px 0 #FFE2E2; transition: all 0.1s; word-break: keep-all; }
        .option-btn:active { transform: translateY(8px); box-shadow: none; }
        
        /* 정/오답 효과 */
        .ans-correct { background-color: var(--success) !important; color: white; border-color: #4CB94C; box-shadow: 0 8px 0 #4CB94C !important; }
        .ans-wrong { background-color: var(--danger) !important; color: white; border-color: #D9534F; box-shadow: 0 8px 0 #D9534F !important; }

        /* 경쟁 모드 레이아웃 */
        .battle-layout { display: flex; width: 100%; height: 100%; }
        .player-zone { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; border-right: 4px dashed #ddd; padding: 15px; }
        .player-zone:last-child { border-right: none; }
        .score { font-size: 32px; color: var(--secondary); margin-bottom: 10px; text-shadow: 1px 1px 0 #fff; }

    </style>
</head>
<body>

    <div id="menu" class="screen active">
        <div class="settings-box">
            <h1>🎮 큰 수 마스터 🏆</h1>
            
            <div class="option-group">
                <p>🎯 어떤 수를 연습할까요?</p>
                <button class="opt-btn selected" onclick="setLimit('man', this)">만(5자리)</button>
                <button class="opt-btn" onclick="setLimit('shipman', this)">십만(6자리)</button>
                <button class="opt-btn" onclick="setLimit('baekman', this)">백만(7자리)</button>
                <button class="opt-btn" onclick="setLimit('cheonman', this)">천만(8자리)</button>
                <button class="opt-btn" onclick="setLimit('eokjo', this)">억 ~ 조</button>
            </div>

            <div class="option-group">
                <p>⏱️ 제한 시간</p>
                <button class="opt-btn" onclick="setTime(30, this)">30초</button>
                <button class="opt-btn selected" onclick="setTime(60, this)">60초</button>
                <button class="opt-btn" onclick="setTime(0, this)">무제한</button>
            </div>
            
            <button class="start-btn" onclick="initGame('single')">👤 혼자 하기</button>
            <button class="start-btn start-btn-battle" onclick="initGame('battle')">👥 둘이 대결</button>
        </div>
    </div>

    <div id="single-game" class="screen">
        <div class="score">⭐ 내 점수: <span id="s-score">0</span>점 | ⏰ 시간: <span id="s-timer-text">-</span></div>
        <div class="timer-bar"><div id="s-timer-fill" class="timer-fill"></div></div>
        <div class="question-box" id="s-question"></div>
        <div class="options-grid" id="s-options"></div>
        <button class="opt-btn" style="position: absolute; bottom: 20px;" onclick="location.reload()">🏠 처음으로</button>
    </div>

    <div id="battle-game" class="screen">
        <div class="battle-layout">
            <div class="player-zone" id="p1-zone">
                <div class="score">🍎 빨강팀: <span id="p1-score">0</span>점</div>
                <div class="question-box" id="p1-question"></div>
                <div id="p1-options" class="options-grid"></div>
            </div>
            <div class="player-zone" id="p2-zone">
                <div class="score">🍏 초록팀: <span id="p2-score">0</span>점</div>
                <div class="question-box" id="p2-question"></div>
                <div id="p2-options" class="options-grid"></div>
            </div>
        </div>
        <div style="position:absolute; top:20px; font-size:24px; font-weight:bold; background:white; padding:10px 30px; border-radius:30px; border: 3px solid #ddd;">
            ⏰ 남은 시간: <span id="b-timer-text">-</span>
        </div>
        <button class="opt-btn" style="position: absolute; bottom: 20px;" onclick="location.reload()">🏠 게임 종료</button>
    </div>

    <script>
        // 게임 설정 (기본값: 만 단위, 60초)
        let config = { min: 10000, max: 99999, time: 60, mode: 'single' };
        let gameState = { sScore: 0, p1Score: 0, p2Score: 0, timeLeft: 60, timerId: null };
        
        // 문제 유형 번갈아 내기 위한 상태 변수
        let turnState = { s: true, p1: true, p2: false }; 

        // 오디오 컨텍스트 (효과음용)
        let audioCtx;

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        // 띠링~ 삐익~ 효과음 함수
        function playSound(type) {
            if (!audioCtx) return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            if (type === 'correct') {
                osc.type = 'sine';
                osc.frequency.setValueAtTime(523.25, audioCtx.currentTime); // 도
                osc.frequency.setValueAtTime(659.25, audioCtx.currentTime + 0.1); // 미
                osc.frequency.setValueAtTime(783.99, audioCtx.currentTime + 0.2); // 솔
                osc.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.5);
                osc.stop(audioCtx.currentTime + 0.5);
            } else {
                osc.type = 'sawtooth';
                osc.frequency.setValueAtTime(300, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(150, audioCtx.currentTime + 0.3);
                osc.start();
                gainNode.gain.exponentialRampToValueAtTime(0.00001, audioCtx.currentTime + 0.3);
                osc.stop(audioCtx.currentTime + 0.3);
            }
        }

        function setLimit(type, btn) {
            const ranges = {
                'man': {min: 10000, max: 99999},
                'shipman': {min: 100000, max: 999999},
                'baekman': {min: 1000000, max: 9999999},
                'cheonman': {min: 10000000, max: 99999999},
                'eokjo': {min: 100000000, max: 900000000000000} // 억~조 단위
            };
            config.min = ranges[type].min;
            config.max = ranges[type].max;
            selectBtn(btn);
        }

        function setTime(sec, btn) {
            config.time = sec;
            selectBtn(btn);
        }

        function selectBtn(btn) {
            Array.from(btn.parentElement.querySelectorAll('.opt-btn')).forEach(b => b.classList.remove('selected'));
            btn.classList.add('selected');
        }

        // 숫자 -> 한글 변환기 (초등 4학년 기준)
        function numberToKorean(num) {
            const units = ['', '만 ', '억 ', '조 '];
            const digits = ['', '일', '이', '삼', '사', '오', '육', '칠', '팔', '구'];
            const tens = ['', '십', '백', '천'];
            let result = ''; let unitIdx = 0;
            let tempNum = num;
            while (tempNum > 0) {
                let chunk = tempNum % 10000;
                let chunkStr = '';
                let chunkArr = String(chunk).split('').reverse();
                for (let i = 0; i < chunkArr.length; i++) {
                    let d = parseInt(chunkArr[i]);
                    if (d !== 0) {
                        let t = digits[d] + tens[i];
                        if (t === '일십') t = '십'; if (t === '일백') t = '백'; if (t === '일천') t = '천';
                        chunkStr = t + chunkStr;
                    }
                }
                if (chunkStr === '일' && unitIdx === 1) {
                    result = '만 ' + result; // 1만 -> 만
                } else if (chunkStr !== '') {
                    result = chunkStr + units[unitIdx] + result;
                }
                tempNum = Math.floor(tempNum / 10000); unitIdx++;
            }
            return result.trim() || '영';
        }

        function generateQuiz(isReadType) {
            const min = config.min;
            const max = config.max;
            // 지정된 범위 내에서 랜덤 숫자 생성
            const num = Math.floor(Math.random() * (max - min + 1)) + min;
            
            const question = isReadType ? num.toLocaleString('ko-KR') : numberToKorean(num);
            const answer = isReadType ? numberToKorean(num) : num.toLocaleString('ko-KR');
            
            let options = [answer];
            while (options.length < 4) {
                // 오답 생성 로직 (자릿수에 맞게 그럴듯한 오답 생성)
                let magnitude = Math.pow(10, Math.floor(Math.log10(num)) - 1);
                if (magnitude < 1) magnitude = 1;
                let diff = (Math.floor(Math.random() * 18) - 9) * magnitude;
                if (diff === 0) diff = magnitude;
                
                let wNum = Math.abs(num + diff);
                if (wNum < min) wNum = min + magnitude; // 범위 이탈 방지
                
                let wOpt = isReadType ? numberToKorean(wNum) : wNum.toLocaleString('ko-KR');
                if (!options.includes(wOpt) && wOpt !== "영") options.push(wOpt);
            }
            return { q: question, a: answer, opts: options.sort(() => Math.random() - 0.5) };
        }

        function initGame(mode) {
            initAudio(); // 효과음 엔진 시작
            config.mode = mode;
            gameState.timeLeft = config.time;
            gameState.sScore = 0; gameState.p1Score = 0; gameState.p2Score = 0;
            
            document.getElementById('menu').classList.remove('active');
            const screenId = mode === 'single' ? 'single-game' : 'battle-game';
            document.getElementById(screenId).classList.add('active');

            if (mode === 'single') renderQuiz('s');
            else { renderQuiz('p1'); renderQuiz('p2'); }

            if (config.time > 0) startTimer();
            else { 
                document.getElementById('s-timer-text').innerText = "무제한";
                document.getElementById('b-timer-text').innerText = "무제한";
            }
        }

        function renderQuiz(pid) {
            // 문제 유형을 번갈아 가면서 출제 (읽기 <-> 쓰기)
            let isReadType = turnState[pid];
            turnState[pid] = !turnState[pid];

            const data = generateQuiz(isReadType);
            const qBox = document.getElementById(`${pid}-question`);
            const oGrid = document.getElementById(`${pid}-options`);
            qBox.innerText = data.q;
            oGrid.innerHTML = '';

            data.opts.forEach(opt => {
                const btn = document.createElement('button');
                btn.className = 'option-btn';
                btn.innerText = opt;
                // 전자칠판 동시 터치 대응
                btn.onclick = (e) => handleAnswer(pid, opt, data.a, e.target, oGrid);
                oGrid.appendChild(btn);
            });
        }

        function handleAnswer(pid, clicked, correct, btn, grid) {
            if (grid.classList.contains('locked')) return;
            grid.classList.add('locked');

            if (clicked === correct) {
                btn.classList.add('ans-correct');
                playSound('correct');
                updateScore(pid, 10);
                setTimeout(() => { grid.classList.remove('locked'); renderQuiz(pid); }, 600);
            } else {
                btn.classList.add('ans-wrong');
                playSound('wrong');
                // 오답 시 정답 보여주기
                Array.from(grid.children).forEach(b => {
                    if (b.innerText === correct) b.classList.add('ans-correct');
                });
                setTimeout(() => { grid.classList.remove('locked'); renderQuiz(pid); }, 1500); 
            }
        }

        function updateScore(pid, points) {
            if (pid === 's') { gameState.sScore += points; document.getElementById('s-score').innerText = gameState.sScore; }
            else if (pid === 'p1') { gameState.p1Score += points; document.getElementById('p1-score').innerText = gameState.p1Score; }
            else { gameState.p2Score += points; document.getElementById('p2-score').innerText = gameState.p2Score; }
        }

        function startTimer() {
            const fill = document.getElementById('s-timer-fill');
            gameState.timerId = setInterval(() => {
                gameState.timeLeft--;
                const txt = gameState.timeLeft + "초";
                document.getElementById('s-timer-text').innerText = txt;
                document.getElementById('b-timer-text').innerText = txt;
                
                if (fill) fill.style.width = (gameState.timeLeft / config.time * 100) + "%";

                if (gameState.timeLeft <= 0) {
                    clearInterval(gameState.timerId);
                    let msg = "";
                    if (config.mode === 'single') msg = `게임 종료! 🎉\n최종 점수: ${gameState.sScore}점`;
                    else {
                        if (gameState.p1Score > gameState.p2Score) msg = `빨강팀 승리! 🍎\n(${gameState.p1Score} : ${gameState.p2Score})`;
                        else if (gameState.p2Score > gameState.p1Score) msg = `초록팀 승리! 🍏\n(${gameState.p1Score} : ${gameState.p2Score})`;
                        else msg = `무승부! 🤝\n(${gameState.p1Score} : ${gameState.p2Score})`;
                    }
                    setTimeout(() => { alert(msg); location.reload(); }, 100);
                }
            }, 1000);
        }
    </script>
</body>
</html>
